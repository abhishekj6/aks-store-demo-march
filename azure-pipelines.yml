# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  vmImage: ubuntu-latest

stages:
- stage: build
  displayName: Docker Build
  pool:
    name: default
    demands:
    - Agent.name -equals docker
  jobs:
  - job: build
    displayName: build and push docker image
    steps:
    - script: "sudo docker build -t abhishek445/store-front:$(Build.BuildNumber) ."
      workingDirectory: src/store-front
    - script: "sudo docker image push abhishek445/store-front:$(Build.BuildNumber)"